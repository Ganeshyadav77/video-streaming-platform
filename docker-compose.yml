version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: video-platform-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_streaming_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-platform-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/video_streaming_db"
      NEXTAUTH_SECRET: "demo-secret-key"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
    command: sh -c "npm install && npx prisma db push --skip-generate && npm run dev"

volumes:
  postgres_data:

networks:
  default:
    name: video-platform-network
